[build]
  publish = "./"

# ── HTTP Headers ─────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers (também ajudam com Core Web Vitals — menos redirects desnecessários)
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Cache: assets estáticos (CSS/JS/imagens — fingerprinted) ─────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: HTML (sem cache agressivo — conteúdo muda) ────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache: arquivos de rastreabilidade ───────────────────────────
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain; charset=utf-8"

# ── Cache: Markdown resumes (para LLMs) ──────────────────────────
[[headers]]
  for = "/docs/data/*.md"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/markdown; charset=utf-8"
