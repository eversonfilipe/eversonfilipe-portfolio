<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Everson Filipe</title>
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <style>
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg-deep);
      text-align: center;
    }
    .error-code {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: var(--font-weight-default);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text-primary);
      line-height: 1;
      margin-bottom: var(--space-4);
    }
    .error-code span {
      color: var(--color-accent-electric);
    }
    .error-message {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      margin-bottom: var(--space-12);
      max-width: 40ch;
      margin-inline: auto;
    }
    .error-line {
      width: 40px;
      height: 1px;
      background: var(--color-accent-electric);
      opacity: 0.5;
      margin: var(--space-6) auto;
    }
  </style>
</head>
<body>
  <div>
    <p class="overline">Error</p>
    <p class="error-code">4<span>0</span>4</p>
    <div class="error-line" aria-hidden="true"></div>
    <p class="error-message">This page does not exist or was moved. Return to the main page.</p>
    <a href="/" class="btn btn-outline" style="display: inline-flex; align-items: center; gap: var(--space-2); font-family: var(--font-primary); font-weight: var(--font-weight-default); font-size: var(--text-sm); letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--color-text-primary); padding: var(--space-3) var(--space-8); border-radius: var(--radius-sm); border: 1px solid rgba(35, 61, 255, 0.4); text-decoration: none;">
      Back to home
    </a>
  </div>
</body>
</html>
